name: publish-image

# On a release tag, build + push the prebuilt agent-base image to GHCR so consumers (and this repo's
# own ci.yml, which currently `docker build`s from scratch every run) can `docker pull` instead.
# Contains NO Anthropic binary — see docker/Dockerfile.agent's header; publishing it is clean.
on:
  push:
    # Full semver tags only (incl. prereleases). Floating Marketplace aliases (v1, v1.0)
    # must NOT trigger an image publish — they point at an already-published release commit.
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:
    # Manual republish of the current default-branch Dockerfile without cutting a release. By default
    # this is STILL gated on ci.yml success for the checked-out commit (same invariant as a tag push) —
    # a manual run must not become a hole that ships a consumer-facing `:2` image from a red commit.
    inputs:
      force_untested:
        description: >-
          BREAK-GLASS: publish even if ci.yml is red / never ran for this commit. Leave false unless
          you are deliberately shipping an emergency image and accept the untested risk. A loud warning
          is emitted and the run is auditable in the Actions log.
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write
  actions: read # query ci.yml's conclusion for this commit (publish gate)

jobs:
  publish:
    runs-on: ubuntu-24.04-arm # linux/arm64 native build, matching Cowork's guest architecture
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # A red-CI tag must not overwrite the floating :2 tags packaged-Action consumers pull.
      # The publish gate must be no weaker than the merge gate (same rule as release.yml).
      # This gate applies to BOTH tag pushes AND manual (workflow_dispatch) republishes — the only
      # way past it is the explicit `force_untested` break-glass input, handled by the step below.
      - name: Loud warning when break-glass (force_untested) is used
        if: github.event_name == 'workflow_dispatch' && inputs.force_untested
        run: |
          echo "::warning::force_untested=true — publishing WITHOUT verifying ci.yml for commit ${GITHUB_SHA}. This can ship a consumer-facing :2 image from a red/untested commit."
      - name: Require ci.yml success for this commit
        # Runs for tag pushes always; for manual runs unless force_untested was deliberately set.
        if: github.event_name == 'push' || !inputs.force_untested
        uses: ./.github/actions/require-ci-success

      - name: Verify the tag matches package.json version (tag pushes only)
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"; exit 1
          fi

      - name: Resolve the package version (tags float on `:2`, this pins an immutable co-tag)
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@03c851098f316948386b8ff87f424ddf8c01536e # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push cowork-agent-base (lean/core image — the default COWORK_AGENT_IMAGE)
        run: |
          docker build --platform linux/arm64 -f docker/Dockerfile.agent \
            -t ghcr.io/${{ github.repository_owner }}/cowork-agent-base:2 \
            -t ghcr.io/${{ github.repository_owner }}/cowork-agent-base:2-${{ steps.pkg.outputs.version }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/cowork-agent-base:2
          docker push ghcr.io/${{ github.repository_owner }}/cowork-agent-base:2-${{ steps.pkg.outputs.version }}

      - name: Build + push cowork-agent-full (COWORK_FULL_PARITY=1 — OCR/Office/markitdown/opencv/table-extraction)
        # Override the base title/description baked into the Dockerfile so the `full` package page is
        # self-describing (the Dockerfile's default LABELs name the base variant).
        run: |
          docker build --platform linux/arm64 --build-arg COWORK_FULL_PARITY=1 -f docker/Dockerfile.agent \
            --label org.opencontainers.image.title=cowork-agent-full \
            --label "org.opencontainers.image.description=Full-parity sandbox runtime image for cowork-harness: the cowork-agent-base toolchain plus OCR (tesseract), LibreOffice, opencv/onnxruntime, and PDF-table extraction — a fidelity-matched Ubuntu 22.04 (linux/arm64) mirror of Claude Cowork's guest rootfs. Contains NO Anthropic binary — the agent is bind-mounted from the user's own Claude Desktop install at run time." \
            -t ghcr.io/${{ github.repository_owner }}/cowork-agent-full:2 \
            -t ghcr.io/${{ github.repository_owner }}/cowork-agent-full:2-${{ steps.pkg.outputs.version }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/cowork-agent-full:2
          docker push ghcr.io/${{ github.repository_owner }}/cowork-agent-full:2-${{ steps.pkg.outputs.version }}
