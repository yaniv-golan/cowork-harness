name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: static checks + unit tests (fast, no Docker, no secrets) ──────────
  unit:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Version lockstep guard (npm package <-> companion skill)
        run: npm run check:versions
      - name: Format check
        run: npm run format:check
      - name: CLI parsing-idiom guard (no silent positional-grab)
        # The first-non-dash-token scan silently grabbed a flag's value as the positional and swallowed
        # unknown flags. Commands resolve positionals via positionals()/parseArgs instead; ban a regression.
        # (The comprehensive enforcement is test/cli-structural-guard.test.ts — every command must reject an
        # unknown flag — which runs under `npm test` below.)
        run: |
          if grep -rEn 'args\.find\(.*startsWith\("--"' src/; then
            echo "::error::Forbidden CLI parsing idiom (first-non-dash-token scan). Use positionals()/parseArgs."
            exit 1
          fi
      - name: Single-source guard (resolveAgentBinary)
        # The agent-binary resolver (with the newest-staged fallback) must be defined ONLY in src/baseline.ts.
        # It was once duplicated inline in container.ts/hostloop.ts without the fallback, so the fallback was
        # dead on the real runtime paths. Ban a second definition. (test/agent-binary-single-source.test.ts
        # also covers this.)
        run: |
          if grep -rEn 'function resolveAgentBinary|const resolveAgentBinary[[:space:]]*=' src/ | grep -vE '^src/baseline\.ts:'; then
            echo "::error::resolveAgentBinary must be defined only in src/baseline.ts (import it; don't re-duplicate)."
            exit 1
          fi
      - name: CLI error-envelope guard (usage/runtime errors must use fail(), not a bare process.exit)
        # A bare `process.exit(1|2)` in src/cli.ts / src/run/doctor.ts outside fail()'s own definition means
        # a new command bypassed the shared JSON envelope (the 2026-07 agent-friendliness audit finding).
        # New catch blocks must call fail(command, category, message, hint, json[, exitCode]) instead.
        # Sites that legitimately keep a raw process.exit (a custom, non-jsonError wire shape) must carry
        # the `cli-error-envelope-exempt` marker comment on the same line — the guard excludes those.
        # (fail() itself lives in src/run/envelope.ts, outside this grep's scope, so no self-match to exclude.)
        run: |
          if grep -n "process\.exit([12])" src/cli.ts src/run/doctor.ts \
             | grep -v "cli-error-envelope-exempt"; then
            echo "::error::Found a bare process.exit(1|2) outside fail() with no cli-error-envelope-exempt marker — route it through fail(...) instead, or add the marker if it's a deliberate custom-shape exception."
            exit 1
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (schema, answerer, egress, launch plan, example validation)
        run: npm test
      - name: Build
        run: npm run build
      - name: Validate CLI wiring
        run: node dist/cli.js list
      - name: Token-free replay gate (example-pdf-skill fixture)
        run: node dist/cli.js replay examples/replays/example-pdf-skill.cassette.json --output-format json
      - name: Token-free replay gate (multiselect gate/controlOut fixture)
        run: node dist/cli.js replay examples/replays/example-multiselect-gate.cassette.json --output-format json
      - name: Token-free replay gate (hostloop computer-links fixture)
        # The ONLY committed cassette at effectiveFidelity:hostloop — the newest/headline tier, which
        # the token-free replay lane otherwise never exercises. Also the replay-side check that a
        # computer:// link resolves (computer_links_resolve) at hostloop.
        run: node dist/cli.js replay examples/replays/hostloop-computer-links.cassette.json --output-format json
      - name: Cassette privacy + staleness scan (committed fixtures)
        # --allow-email covers the one expected email finding: the init-1 capability-manifest
        # `account.email` field the harness bakes into every REAL recording (docs/cassette.md's
        # "Privacy: cassettes are committed fixtures" section calls this out by name). This cassette
        # was scrubbed post-hoc (the real recording account's email, MCP-server list, plugin cache
        # paths, and private marketplace name were replaced with synthetic placeholders — see git
        # history for examples/replays/example-multiselect-gate.cassette.json) — the placeholder
        # `synthetic-user@example.com` in that same field is what's allow-listed here now. A NEW
        # email finding elsewhere still fails the gate. The scanner's `path` class also runs on this cassette's
        # capability-manifest and passes clean with NO --allow-path needed — its synthetic paths use
        # a /tmp/ prefix specifically so they don't collide with that class, rather than being
        # allow-listed (see that plan's Design Decision 3).
        # --allow-domain covers `claude.com`: the hostloop-computer-links cassette records the
        # workspace MCP `initialize` handshake, whose clientInfo.websiteUrl is
        # `https://claude.com/claude-code` — the agent's own public product URL, identical in every
        # real recording, not PII. A NEW/different domain finding still fails the gate.
        run: node dist/cli.js verify-cassettes examples/replays/ --allow-email 'synthetic-user@example\.com' --allow-domain 'claude\.com'
      - name: Lint example scenarios (no-silent-false-green invariants)
        run: node dist/cli.js lint examples/scenarios/*.yaml

  # ── Stage 1a: packaged Action self-test (uses: ./ against THIS commit, packed as a tarball —
  # never against whatever's currently published on npm) ─────────────────────────
  action-self-test:
    name: "Action self-test (uses: ./)"
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: npm }
      - run: npm ci && npm run build
      - name: Pack this commit (the action must install THIS code, not the last npm publish)
        id: pack
        run: |
          npm pack --pack-destination /tmp >/dev/null
          echo "tarball=$(ls /tmp/cowork-harness-*.tgz)" >> "$GITHUB_OUTPUT"
      - name: Run the action against the committed pass-case fixture
        id: passcase
        uses: ./
        with:
          command: replay
          path: examples/replays/example-pdf-skill.cassette.json
          version: ${{ steps.pack.outputs.tarball }}
      - name: Verify the reporter actually ran
        # $GITHUB_STEP_SUMMARY is scoped to THIS action invocation's own steps (all composite
        # sub-steps share one file), so a later, separate workflow step gets a fresh, empty file and
        # can never read back what the action wrote — check the summary-md OUTPUT instead.
        run: |
          if [ -z "${{ steps.passcase.outputs.summary-md }}" ]; then
            echo "::error::action-self-test: summary-md output is empty — the reporter didn't write anything."
            exit 1
          fi
      - name: Run the action against a nonexistent path (must fail — proves exit-code propagation)
        id: failcase
        continue-on-error: true
        uses: ./
        with:
          command: replay
          path: examples/replays/this-cassette-does-not-exist.json
          version: ${{ steps.pack.outputs.tarball }}
      - name: Verify the failing case actually failed
        # continue-on-error above masks the step's own exit code so this job can inspect it instead
        # of dying immediately — this assertion is the point of the whole failing-case step.
        run: |
          if [ "${{ steps.failcase.outcome }}" != "failure" ]; then
            echo "::error::action-self-test: expected the nonexistent-path invocation to fail, got outcome='${{ steps.failcase.outcome }}'"
            exit 1
          fi
      - name: Run the action against a deliberately-failing ASSERTION (distinct from the usage
          error above — proves exit 1 / verdict-fail propagates, not just exit 2 / usage errors)
        id: assertfailcase
        continue-on-error: true
        uses: ./
        with:
          command: replay
          path: examples/replays/example-pdf-skill.cassette.json
          version: ${{ steps.pack.outputs.tarball }}
          extra-args: "--assert-from examples/replays/example-pdf-skill-ci-selftest-failing.yaml"
      - name: Verify the assertion-failure case actually failed, and the reporter rendered a fail row
        env:
          # steps.assertfailcase.outputs.summary-md, not $GITHUB_STEP_SUMMARY — that file is scoped
          # to the assertfailcase step's own invocation; this (separate) step would see a fresh, empty one.
          SUMMARY_MD: ${{ steps.assertfailcase.outputs.summary-md }}
        run: |
          if [ "${{ steps.assertfailcase.outcome }}" != "failure" ]; then
            echo "::error::action-self-test: expected the deliberately-failing assertion to fail, got outcome='${{ steps.assertfailcase.outcome }}'"
            exit 1
          fi
          # This step's summary-md is just the assertfailcase invocation's own row (not cumulative
          # across the job's earlier steps — each action invocation renders only its own run).
          if ! grep -qE "example-pdf-skill.*❌ fail" <<< "$SUMMARY_MD"; then
            echo "::error::action-self-test: reporter output doesn't show a failing verdict row for example-pdf-skill — the reporter may not be rendering assertion failures correctly."
            exit 1
          fi

  # ── Stage 1b: pytest `cowork` lane — helper self-checks (no Docker/token; -m 'not cowork') ──
  python:
    name: pytest cowork-lane (helper self-checks)
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.11" }
      - run: pip install pytest # PyYAML is bundled with scenario.py (_vendor/) — no separate install; this also exercises the vendored fallback path
      - name: Run the non-cowork (pure) helper tests
        working-directory: python
        run: pytest -m 'not cowork'

  # ── Stage 2: boundary parity (Docker; no API key needed — pure sandbox probes) ──
  boundary:
    name: boundary parity (L1 container)
    runs-on: ubuntu-24.04-arm # arm64 to match Cowork's linux/arm64 guest
    needs: unit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: npm }
      - run: npm ci && npm run build
      - name: Build agent base image (no Anthropic binary baked in)
        run: docker build --platform linux/arm64 -t cowork-agent-base:2 -f docker/Dockerfile.agent .
      - name: Prove the sandbox enforces Cowork's limitations (self-contained sidecar)
        run: node dist/cli.js boundary-check
      - name: Live contract tests — guard the binary assumptions (no token needed)
        # Requires the staged agent; only runs where it's present. Skips cleanly otherwise.
        run: npm run test:live

  # ── Stage 3: live scenario suite (needs ANTHROPIC_API_KEY; skipped on forks) ────
  scenarios:
    name: scenario suite (mixed protocol/container, live inference)
    runs-on: ubuntu-24.04-arm
    needs: boundary
    permissions:
      contents: read
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      # Runs now default to ~/.cowork-harness/runs (outside any working tree). Pin them back into the
      # workspace so `upload-artifact path: runs/` captures them. RELATIVE (not an absolute workspace path)
      # so it tracks any step's working-directory together with the upload path — an absolute/relative split
      # would silently upload an empty artifact (the upload is `if: always()`, so it would stay green).
      COWORK_HARNESS_RUNS_DIR: runs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: npm }
      - run: npm ci && npm run build
      - name: Guard — require API key
        id: guard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — skipping live scenario suite."
            echo "live=false" >> "$GITHUB_OUTPUT"
          else
            echo "live=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build agent base image (per-run egress sidecar is self-managed)
        if: steps.guard.outputs.live == 'true'
        run: docker build --platform linux/arm64 -t cowork-agent-base:2 -f docker/Dockerfile.agent .
      - name: Run example scenarios (L1 container — the user-facing worked examples)
        if: steps.guard.outputs.live == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node dist/cli.js run examples/scenarios/
      - name: Run e2e self-tests (L0 / L1 / hostloop — microvm excluded; needs a real VM)
        if: steps.guard.outputs.live == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for s in smoke-askuserquestion smoke-multiselect smoke-multiselect-deciderdir smoke-l1-container smoke-l1-egress canary-hostloop; do
            node dist/cli.js run "e2e/scenarios/$s.yaml" || exit 1
          done
      - name: Verify run artifacts were produced (guards against a silent empty upload)
        if: steps.guard.outputs.live == 'true'
        run: |
          if [ -z "$(ls -A runs 2>/dev/null)" ]; then
            echo "::error::runs/ is empty after the scenario suite — COWORK_HARNESS_RUNS_DIR misconfigured (artifact upload would capture nothing)."
            exit 1
          fi
      - name: Upload run artifacts (transcripts, decisions, egress logs)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: run-artifacts
          path: runs/
          retention-days: 14

  # ── Stage 4: parity drift watch — can't diff live Desktop on CI (macOS-only app), so this
  # instead FAILS if the newest committed baseline is stale by wall-clock age, forcing a human
  # to re-run `sync` periodically rather than letting the baseline silently rot indefinitely. ──
  parity-drift:
    name: parity drift vs upstream Desktop
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Baseline staleness gate (90-day ceiling on the newest committed baseline)
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const dir = "baselines";
            const files = fs.readdirSync(dir).filter((f) => /^desktop-.*\.json$/.test(f));
            if (files.length === 0) { console.error("::error::no baselines/desktop-*.json found"); process.exit(1); }
            let newest = null;
            for (const f of files) {
              const b = JSON.parse(fs.readFileSync(path.join(dir, f), "utf8"));
              const t = Date.parse(b.capturedAt);
              if (!newest || t > newest.t) newest = { t, f, capturedAt: b.capturedAt };
            }
            const ageDays = (Date.now() - newest.t) / 86400000;
            console.log(`newest baseline: ${newest.f} (capturedAt ${newest.capturedAt}, ${ageDays.toFixed(1)} days ago)`);
            if (ageDays > 90) {
              console.error(`::error::newest baseline is ${ageDays.toFixed(0)} days old (>90) — run \`cowork-harness sync --diff\` on macOS against the current Claude Desktop and commit the refreshed baseline.`);
              process.exit(1);
            }
          '
      - name: Note
        run: |
          echo "Platform baselines are synced from a developer's installed Claude Desktop via"
          echo "\`cowork-harness sync --diff\` (needs the macOS app — Cowork Desktop is macOS-only; not available on CI runners)."
          echo "The staleness gate above catches an ABANDONED baseline; it cannot catch a baseline that is"
          echo "merely stale relative to a Desktop release from yesterday — a human still has to run sync"
          echo "after every Desktop update. See docs/maintenance via README → Maintenance."
