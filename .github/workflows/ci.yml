name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: static checks + unit tests (fast, no Docker, no secrets) ──────────
  unit:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Version lockstep guard (npm package <-> companion skill)
        run: npm run check:versions
      - name: Format check
        run: npm run format:check
      - name: CLI parsing-idiom guard (no silent positional-grab)
        # The first-non-dash-token scan silently grabbed a flag's value as the positional and swallowed
        # unknown flags. Commands resolve positionals via positionals()/parseArgs instead; ban a regression.
        # (The comprehensive enforcement is test/cli-structural-guard.test.ts — every command must reject an
        # unknown flag — which runs under `npm test` below.)
        run: |
          if grep -rEn 'args\.find\(.*startsWith\("--"' src/; then
            echo "::error::Forbidden CLI parsing idiom (first-non-dash-token scan). Use positionals()/parseArgs."
            exit 1
          fi
      - name: Single-source guard (resolveAgentBinary)
        # The agent-binary resolver (with the newest-staged fallback) must be defined ONLY in src/baseline.ts.
        # It was once duplicated inline in container.ts/hostloop.ts without the fallback, so the fallback was
        # dead on the real runtime paths. Ban a second definition. (test/agent-binary-single-source.test.ts
        # also covers this.)
        run: |
          if grep -rEn 'function resolveAgentBinary|const resolveAgentBinary[[:space:]]*=' src/ | grep -vE '^src/baseline\.ts:'; then
            echo "::error::resolveAgentBinary must be defined only in src/baseline.ts (import it; don't re-duplicate)."
            exit 1
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (schema, answerer, egress, launch plan, example validation)
        run: npm test
      - name: Build
        run: npm run build
      - name: Validate CLI wiring
        run: node dist/cli.js list
      - name: Token-free replay gate (example-pdf-skill fixture)
        run: node dist/cli.js replay examples/replays/example-pdf-skill.cassette.json --output-format json
      - name: Cassette privacy + staleness scan (committed fixtures)
        run: node dist/cli.js verify-cassettes examples/replays/
      - name: Lint example scenarios (no-silent-false-green invariants)
        run: node dist/cli.js lint examples/scenarios/*.yaml

  # ── Stage 1b: pytest `cowork` lane — helper self-checks (no Docker/token; -m 'not cowork') ──
  python:
    name: pytest cowork-lane (helper self-checks)
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.11" }
      - run: pip install pytest # PyYAML is bundled with scenario.py (_vendor/) — no separate install; this also exercises the vendored fallback path
      - name: Run the non-cowork (pure) helper tests
        working-directory: python
        run: pytest -m 'not cowork'

  # ── Stage 2: boundary parity (Docker; no API key needed — pure sandbox probes) ──
  boundary:
    name: boundary parity (L1 container)
    runs-on: ubuntu-24.04-arm # arm64 to match Cowork's linux/arm64 guest
    needs: unit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: npm }
      - run: npm ci && npm run build
      - name: Build agent base image (no Anthropic binary baked in)
        run: docker build --platform linux/arm64 -t cowork-agent-base:2 -f docker/Dockerfile.agent .
      - name: Prove the sandbox enforces Cowork's limitations (self-contained sidecar)
        run: node dist/cli.js boundary-check
      - name: Live contract tests — guard the binary assumptions (no token needed)
        # Requires the staged agent; only runs where it's present. Skips cleanly otherwise.
        run: npm run test:live

  # ── Stage 3: live scenario suite (needs ANTHROPIC_API_KEY; skipped on forks) ────
  scenarios:
    name: scenario suite (L1, live inference)
    runs-on: ubuntu-24.04-arm
    needs: boundary
    permissions:
      contents: read
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      # Runs now default to ~/.cowork-harness/runs (outside any working tree). Pin them back into the
      # workspace so `upload-artifact path: runs/` captures them. RELATIVE (not an absolute workspace path)
      # so it tracks any step's working-directory together with the upload path — an absolute/relative split
      # would silently upload an empty artifact (the upload is `if: always()`, so it would stay green).
      COWORK_HARNESS_RUNS_DIR: runs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: npm }
      - run: npm ci && npm run build
      - name: Guard — require API key
        id: guard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — skipping live scenario suite."
            echo "live=false" >> "$GITHUB_OUTPUT"
          else
            echo "live=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build agent base image (per-run egress sidecar is self-managed)
        if: steps.guard.outputs.live == 'true'
        run: docker build --platform linux/arm64 -t cowork-agent-base:2 -f docker/Dockerfile.agent .
      - name: Run example scenarios (L1 container — the user-facing worked examples)
        if: steps.guard.outputs.live == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node dist/cli.js run examples/scenarios/
      - name: Run e2e self-tests (L0 / L1 / hostloop — microvm excluded; needs a real VM)
        if: steps.guard.outputs.live == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for s in smoke-askuserquestion smoke-l1-container smoke-l1-egress canary-hostloop; do
            node dist/cli.js run "e2e/scenarios/$s.yaml" || exit 1
          done
      - name: Verify run artifacts were produced (guards against a silent empty upload)
        if: steps.guard.outputs.live == 'true'
        run: |
          if [ -z "$(ls -A runs 2>/dev/null)" ]; then
            echo "::error::runs/ is empty after the scenario suite — COWORK_HARNESS_RUNS_DIR misconfigured (artifact upload would capture nothing)."
            exit 1
          fi
      - name: Upload run artifacts (transcripts, decisions, egress logs)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: run-artifacts
          path: runs/
          retention-days: 14

  # ── Stage 4: parity drift watch (informational; never fails the build) ─────────
  parity-drift:
    name: parity drift vs upstream Desktop
    runs-on: ubuntu-latest
    needs: unit
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Note
        run: |
          echo "Platform baselines are synced from a developer's installed Claude Desktop via"
          echo "\`cowork-harness sync --diff\` (needs the macOS app — Cowork Desktop is macOS-only; not available on CI runners)."
          echo "This job is a placeholder reminder; run sync locally when Desktop updates."
          echo "See docs/maintenance via README → Maintenance."
