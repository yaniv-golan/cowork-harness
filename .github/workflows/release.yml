name: release

# Cut a release via the branch→PR→merge→tag flow in RELEASING.md. Tag the MERGE COMMIT (main HEAD
# after `gh pr merge`), NOT a release-branch head: the publish gate below (require-ci-success) looks
# for a PUSH-event ci.yml run for the tagged SHA, and a branch/PR head only has a pull_request run.
# Do NOT `npm version && git push --follow-tags` from a release branch — that tags the branch head.
# A pushed `vX.Y.Z` tag (matching package.json) builds, tests, publishes to npm with
# provenance, and creates a GitHub Release. Auth is npm Trusted Publishing (OIDC) —
# no NPM_TOKEN secret: configure cowork-harness's trusted publisher on npmjs.com
# (GitHub repo yaniv-golan/cowork-harness + workflow `release.yml`).
on:
  push:
    # Full semver tags only (incl. prereleases like v1.0.4-rc.1). The floating Marketplace
    # aliases (v1, v1.0) must NOT trigger a publish — they'd only die at the version guard.
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (OIDC)
  actions: read # query ci.yml's conclusion for this commit (publish gate)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The publish gate must be no weaker than the merge gate. `npm run ci` (below) is TS-only;
      # ci.yml also runs pytest, format, the replay gate, boundary + scenario suites. So require
      # ci.yml to have SUCCEEDED for this exact commit before publishing. Polls (up to ~30 min) so
      # `git push --follow-tags` (commit + tag together) works even if ci.yml is still running.
      # Shared with publish-image.yml so the two publish gates can't drift.
      - name: Require ci.yml success for this commit
        uses: ./.github/actions/require-ci-success

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; the Node runtime ships an older npm, so pull a
      # newer one. Pin to npm 11 (latest major) rather than @latest: npm 12.0.0 shipped broken for our use
      # — it needs Node >= 22 AND its --provenance path fails with a missing `sigstore` module. 11.x is
      # OIDC-capable and stable; revisit the pin when a 12.x is known-good.
      - name: Use a trusted-publishing-capable npm
        run: npm install -g npm@11

      - run: npm ci

      - name: Verify the tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"; exit 1
          fi

      - name: Verify CHANGELOG has a heading for this version
        run: |
          V="${GITHUB_REF_NAME#v}"
          V_ESC="$(printf '%s' "$V" | sed 's/\./\\./g')"
          grep -qE "^## \[$V_ESC\]" CHANGELOG.md \
            || { echo "::error::no '## [$V]' heading in CHANGELOG.md"; exit 1; }

      - name: Version lockstep guard (npm package <-> companion skill)
        run: npm run check:versions

      - name: Build + test (also runs via prepublishOnly)
        run: npm run ci

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public

      - name: Extract this version's CHANGELOG section
        run: |
          V="${GITHUB_REF_NAME#v}"
          # Print the lines under `## [V]` up to (not including) the next `## [` heading.
          # `index(...)==1` matches the literal heading start, so dots in V need no escaping.
          awk -v ver="$V" '
            index($0, "## [" ver "]") == 1 { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Fail-safe: the "Verify CHANGELOG has a heading" step above already guarantees the section,
          # but never ship an empty body — fall back to an absolute CHANGELOG link.
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md) for the release notes." > RELEASE_NOTES.md
          fi
          echo "----- RELEASE_NOTES.md -----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # The CHANGELOG section becomes the body; generate_release_notes appends the
          # auto "Full Changelog" compare link below it (softprops pre-pends `body`).
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
