name: release

# Tag a release: `npm version <patch|minor|major>` then `git push --follow-tags`.
# A pushed `vX.Y.Z` tag (matching package.json) builds, tests, publishes to npm with
# provenance, and creates a GitHub Release. Auth is npm Trusted Publishing (OIDC) —
# no NPM_TOKEN secret: configure cowork-harness's trusted publisher on npmjs.com
# (GitHub repo yaniv-golan/cowork-harness + workflow `release.yml`).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.
      - name: Use a trusted-publishing-capable npm
        run: npm install -g npm@latest

      - run: npm ci

      - name: Verify the tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"; exit 1
          fi

      - name: Build + test (also runs via prepublishOnly)
        run: npm run ci

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](./CHANGELOG.md) for the release notes.
