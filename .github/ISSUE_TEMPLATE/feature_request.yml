name: Feature request
description: Suggest a capability or a fidelity improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to test that you can't today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Session setup / discovery
        - Scenario / assertions
        - Boundary / sandbox fidelity
        - Parity sync
        - Runtimes (container / microvm)
        - CI / tooling
        - Docs
    validations:
      required: true
