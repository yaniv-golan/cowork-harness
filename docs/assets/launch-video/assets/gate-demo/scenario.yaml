# Video-only demo scenario — see docs/internal/2026-07-01-gate-provenance-video-beat-proposal.md §4.3.
# Purpose: fire exactly one scripted AskUserQuestion gate, deterministically, so the run's footer
# reads `gates: 1 · 1 scripted` — a visual proof that the answer was scripted, not silently guessed.
# Not a public example; run via `cowork-harness run` (not `skill`) to get the assert: block + footer.
#
# Run:  cowork-harness run docs/assets/launch-video/assets/gate-demo/scenario.yaml
baseline: latest
session: ./session.yaml
fidelity: container
on_unanswered: fail # explicit, though `run`'s own default IS already `fail` (docs/scenario.md:110) —
                     # spelled out so a wording drift across takes fails loud + re-takeable, never a
                     # silent TTY block (the mechanism that hung a real VHS capture, per the
                     # dogfooding findings' F2)

prompt: |
  Use the gate-demo skill to summarize sales.csv from your uploads.

answers:
  # Reuses examples/answer-policies/demo.yaml's existing rule verbatim (same wording, same choice).
  - when_question: "output format|which format" # AskUserQuestion — the ONE gate this skill always asks
    choose: "Markdown"
  # Tool-permission gates the agent will hit doing the actual work — with on_unanswered: fail above,
  # ANY unscripted gate (not just the question) is a hard capture failure, so these are scripted too
  # rather than relying on permission_parity to paper over it.
  - when_tool: Skill
    decide: allow
  - when_tool: Write
    decide: allow

assert:
  - result: success
  - gate_answers_delivered: true
  - questions_count_max: 1
  - tool_called: Skill # direct guardrail against a silently-empty plugin mount (F1) — the skill
                        # genuinely loaded and ran, not just "a question got answered"
  - user_visible_artifact: outputs/summary.md
