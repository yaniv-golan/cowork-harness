# Video-only demo session (see docs/internal/2026-07-01-gate-provenance-video-beat-proposal.md §4).
# Minimal — only what gate-demo needs. Not a public example; do not promote without a separate
# decision (per the plan's §4.2 "asset scope" recommendation).

model: claude-opus-4-8
effort: high
max_thinking_tokens: 8000 # kept low for demo cost; real default 31999 (see docs/session.md)
permission_mode: default
permission_parity: cowork

uploads:
  - ../../../../../examples/data/sales.csv

plugins:
  config_dir: null
  marketplaces:
    - https://github.com/anthropics/claude-code.git
  enabled:
    - gate-demo@local
  local_plugins:
    - ./skill

skills:
  local: []

mcp:
  config: null
  enabled: []

egress:
  extra_allow: []
  unrestricted: false
