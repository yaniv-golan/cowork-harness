# e2e session for the host-loop canary: mounts a plugin purely so ${CLAUDE_PLUGIN_ROOT}
# resolves (the canary asserts that path is a host path bash can't reach → self-heal).
# Reuses the example my-pdf-skill cross-tree — the canary needs *a* mounted plugin, not a
# specific one. Paths resolve relative to THIS file's dir (see docs/session.md "Path expansion").
permission_mode: default
permission_parity: cowork
plugins:
  local_plugins:
    - ../../examples/skills/my-pdf-skill
