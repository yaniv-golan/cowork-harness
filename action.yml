name: "cowork-harness"
description: >-
  Run cowork-harness (replay/lint/lint-skill/analyze-skill/verify-cassettes/run) against a scenario,
  cassette, or skill path and report the verdict as a PR job summary. The token-free lane
  (replay/lint/lint-skill/analyze-skill/verify-cassettes) runs on any ubuntu-latest runner — no Docker,
  no API key, no agent binary. `run` (the live lane) additionally needs Docker + a provisioned agent
  binary; this action does not provision either — see the cowork-harness README's CI section for what a
  self-hosted live-lane runner needs.
author: "Yaniv Golan"

inputs:
  command:
    description: >-
      cowork-harness subcommand to run: replay | lint | lint-skill | analyze-skill | verify-cassettes |
      run. `lint` and `lint-skill` are thin passthroughs to the bundled `scenario.py` (needs python3 on
      the runner — preinstalled on ubuntu-latest); `analyze-skill` is a pure-TS static scan (no python3
      needed). This is a description, not a validated allowlist — `path`/`extra-args` are built verbatim
      into the invocation for any subcommand the installed `cowork-harness` accepts.
    required: false
    default: "replay"
  path:
    description: "Cassette/scenario/SKILL.md/skill-dir to check (positional argument to the command)"
    required: true
  version:
    description: "npm version or dist-tag of cowork-harness to install"
    required: false
    default: "latest"
  strict:
    description: >-
      Pass --strict — fail on any finding instead of just the default gate: for `replay`, any
      cassette-staleness finding (not just skill/shared-root drift); for `lint`/`lint-skill`, any
      WARN/INFO finding (not just ERROR); for `analyze-skill`, any advisory finding at all (it's exit-0
      by default). `verify-cassettes`/`run` don't accept `--strict` (unknown-flag usage error), so it is
      IGNORED (not forwarded) for those two commands.
    required: false
    default: "false"
  fail-on-skill-drift:
    description: "Pass --fail-on-skill-drift — REPLAY ONLY (fail on skill/shared-root staleness classes); not forwarded to any other command."
    required: false
    default: "false"
  extra-args:
    description: "Additional raw CLI arguments, space-separated, appended verbatim after the standard flags"
    required: false
    default: ""
  summary:
    description: "Write the verdict table to $GITHUB_STEP_SUMMARY"
    required: false
    default: "true"
  anthropic-api-key:
    description: >-
      API key for the live `run` lane. Unused by replay/lint/verify-cassettes. This action does NOT
      stage the agent binary or build the Docker image for you, by design, not an oversight — a live
      `run` needs both already available on the runner. Staging the binary is a call about your own
      relationship with Anthropic's distribution terms, so it stays a step in YOUR workflow, not
      something this action automates on your behalf. See the README's "Packaged GitHub Action"
      section for a worked self-hosted-runner example.
    required: false
    default: ""

outputs:
  ok:
    description: '"true"/"false" — the envelope-level pass/fail (mirrors the command''s exit code)'
    value: ${{ steps.run.outputs.ok }}
  envelope-path:
    description: "Path to the raw JSON envelope file, for a caller that wants to post-process it further"
    value: ${{ steps.run.outputs.envelope-path }}
  summary-md:
    description: >-
      The rendered markdown verdict table (same content appended to $GITHUB_STEP_SUMMARY when
      `summary: true`). Exposed as an output — not just the step summary file — because
      $GITHUB_STEP_SUMMARY is scoped to this action's own invocation; a caller's later step gets a
      fresh, empty file and can't read back what this step wrote.
    value: ${{ steps.report.outputs.summary-md }}

runs:
  using: "composite"
  steps:
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "20"

    - name: Install cowork-harness
      shell: bash
      # `version` is normally an npm dist-tag/version ("latest", "0.22.0"); it also accepts a local
      # tarball/path/URL directly (used by this repo's own ci.yml self-test, which packs the current
      # commit and installs THAT instead of whatever's published) — detected by shape, no separate input.
      run: |
        v="${{ inputs.version }}"
        case "$v" in
          /*|file:*|*.tgz|http://*|https://*|git+*) target="$v" ;;
          *) target="cowork-harness@$v" ;;
        esac
        npm install --global "$target"

    - name: Run cowork-harness
      id: run
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        set +e
        args=("${{ inputs.command }}" "${{ inputs.path }}" "--output-format" "json")
        # --strict is accepted only by replay/lint/lint-skill/analyze-skill; verify-cassettes/run exit 2
        # ("unknown flag") on it, so it must NOT be forwarded to those two commands.
        case "${{ inputs.command }}" in
          replay | lint | lint-skill | analyze-skill)
            [ "${{ inputs.strict }}" = "true" ] && args+=("--strict")
            ;;
        esac
        # --fail-on-skill-drift is REPLAY-only (a cassette/skill-drift staleness flag); lint/lint-skill/
        # analyze-skill don't know it — forwarding it there would be the same class of "unknown flag"
        # breakage --output-format used to cause, just for a narrower input combination.
        [ "${{ inputs.command }}" = "replay" ] && [ "${{ inputs.fail-on-skill-drift }}" = "true" ] && args+=("--fail-on-skill-drift")
        if [ -n "${{ inputs.extra-args }}" ]; then
          # deliberately word-split: extra-args is documented as space-separated raw flags
          read -ra extra <<< "${{ inputs.extra-args }}"
          args+=("${extra[@]}")
        fi
        cowork-harness "${args[@]}" > cowork-harness-envelope.json
        exit_code=$?
        ok=$(node -e 'try{process.stdout.write(String(JSON.parse(require("fs").readFileSync("cowork-harness-envelope.json","utf8")).ok))}catch{process.stdout.write("false")}')
        echo "ok=$ok" >> "$GITHUB_OUTPUT"
        echo "envelope-path=cowork-harness-envelope.json" >> "$GITHUB_OUTPUT"
        echo "exit-code=$exit_code" >> "$GITHUB_OUTPUT"

    - name: Report
      id: report
      if: always()
      shell: bash
      run: |
        summary_flag=""
        [ "${{ inputs.summary }}" = "true" ] && summary_flag="--summary"
        md="$(node "${{ github.action_path }}/.github/actions/report/render.js" cowork-harness-envelope.json $summary_flag)"
        echo "$md"
        delim="cowork_harness_summary_$(date +%s%N)"
        {
          echo "summary-md<<$delim"
          echo "$md"
          echo "$delim"
        } >> "$GITHUB_OUTPUT"

    - name: Propagate exit code
      shell: bash
      run: exit ${{ steps.run.outputs.exit-code }}
