name: eval-14-subagent-dispatch-and-declared-unused
baseline: latest
session: ./_session.yaml
fidelity: container
prompt: 'My `subagent_dispatched: researcher` assertion never matches even though a sub-agent clearly
  ran, and `subagent_declared_but_unused` keeps firing. How do these assertions actually match, and is
  `dispatch_count_max` a real production cap I''m reproducing?'
assert:
- semantic_matches:
    rubric:
    - subagent_dispatched matches by the dispatch description too, not only by subagent_type
    - Skills often dispatch with no subagent_type (agentType is 'unknown'), so matching should use the
      description
    - subagent_declared_but_unused fires when a declared sub-agent tool was not used, even if other tools
      were used
    - dispatch_count_max is an author-chosen budget / post-hoc count assertion, not a reproduction of
      a production cap
    - Cowork DOES cap Task fan-out agent-side (taskRegistry, concurrent/per-session), separate from the
      scheduled-task limiter, and the harness inherits it by running the real agent binary
    - dispatch_count_max should be used only to catch a fan-out you don't want
