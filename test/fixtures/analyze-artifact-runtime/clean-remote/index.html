<!doctype html>
<html>
  <body>
    <button id="save">Save</button>
    <div id="msg"></div>
    <script>
      document.getElementById("save").addEventListener("click", function () {
        // Absolute, genuinely different-origin write-back — not this bug class, must resolve to "clean".
        fetch("https://api.example.com/v1/save", { method: "POST", body: JSON.stringify({ ok: true }) }).then(
          function () {
            document.getElementById("msg").textContent = "Saved!";
          },
        );
      });
    </script>
  </body>
</html>
